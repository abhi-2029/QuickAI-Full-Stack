apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: quickai
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: abhi2029/quickai-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: quickai-secrets
              key: DATABASE_URL
        - name: CLERK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: quickai-secrets
              key: CLERK_SECRET_KEY
        - name: CLERK_PUBLISHABLE_KEY
          valueFrom:
            configMapKeyRef:
              name: quickai-config
              key: VITE_CLERK_PUBLISHABLE_KEY
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: quickai-secrets
              key: GROQ_API_KEY
        - name: CLOUDINARY_CLOUD_NAME
          valueFrom:
            configMapKeyRef:
              name: quickai-config
              key: CLOUDINARY_CLOUD_NAME
        - name: CLOUDINARY_API_KEY
          valueFrom:
            secretKeyRef:
              name: quickai-secrets
              key: CLOUDINARY_API_KEY
        - name: CLOUDINARY_API_SECRET
          valueFrom:
            secretKeyRef:
              name: quickai-secrets
              key: CLOUDINARY_API_SECRET
        - name: CLIPDROP_API_KEY
          valueFrom:
            secretKeyRef:
              name: quickai-secrets
              key: CLIPDROP_API_KEY
