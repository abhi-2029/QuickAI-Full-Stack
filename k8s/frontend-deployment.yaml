apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: quickai
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: abhi2029/quickai-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5173
        env:
        - name: VITE_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: quickai-config
              key: VITE_BASE_URL
        - name: VITE_CLERK_PUBLISHABLE_KEY
          valueFrom:
            configMapKeyRef:
              name: quickai-config
              key: VITE_CLERK_PUBLISHABLE_KEY
